<style>
/* --- дизайн-токены (раньше брались из внешней системы, теперь заданы тут) --- */
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --bg-page:        #0c0a16;
  --surface-0:      #15131f;
  --surface-1:      #1f1c2c;
  --border:         rgba(255,255,255,0.10);
  --radius:         8px;
  --text-primary:   #ffffff;
  --accent:         #f2c14e; /* «блеск» под ювелирный бренд */
}

html, body {
  background: var(--bg-page);
  min-height: 100%;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

#gc { position: relative; width: 360px; margin: 0 auto; font-family: var(--font-sans); padding: 12px 0; }
#gameCanvas {
  display: block; border-radius: 12px; border: 0.5px solid var(--border);
  image-rendering: pixelated; image-rendering: crisp-edges;
}
#ui { position: absolute; top: 24px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 16px; pointer-events: none; }
.ul { font-size: 13px; font-weight: 500; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }

#overlay { position: absolute; top: 12px; left: 0; right: 0; bottom: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; background: rgba(10,10,20,0.82); }
#overlay h2 { font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 8px; }
#overlay p  { font-size: 14px; color: rgba(255,255,255,0.65); margin-bottom: 24px; text-align: center; padding: 0 28px; line-height: 1.6; }
.sd { font-size: 40px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
.sl { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 24px; }

.btn-primary { padding: 10px 36px; font-size: 15px; font-weight: 600; background: #fff; color: #111; border: none; border-radius: 8px; cursor: pointer; }
.btn-primary:hover { background: #e4e4e4; }
.btn-ghost { margin-top: 12px; padding: 8px 22px; font-size: 13px; font-weight: 500; background: transparent; color: rgba(255,255,255,0.8); border: 0.5px solid var(--border); border-radius: 8px; cursor: pointer; }
.btn-ghost:hover { background: rgba(255,255,255,0.06); }

#mc { display: flex; gap: 8px; margin-top: 8px; padding: 0; }
.mb { flex: 1; height: 48px; background: var(--surface-1); border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 20px; cursor: pointer; user-select: none; color: var(--text-primary); -webkit-user-select: none; }
.mb:active { background: var(--surface-0); }

#hud-icons { position: absolute; top: 46px; left: 16px; display: flex; gap: 6px; pointer-events: none; }
.hicon { font-size: 16px; opacity: 0.9; }

/* --- прелоадер --- */
#preloader {
  position: fixed; inset: 0; z-index: 9999;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(242,193,78,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(242,193,78,0.05) 0%, transparent 50%),
    linear-gradient(160deg, #0e0c1a 0%, #12101f 50%, #0a0a14 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
  transition: opacity 0.6s ease;
}
#preloader.fade-out { opacity: 0; pointer-events: none; }



/* Декоративные круги свечения */
.pl-glow {
  position: absolute; border-radius: 50%;
  pointer-events: none;
}
.pl-glow-1 {
  width: 340px; height: 340px;
  background: radial-gradient(circle, rgba(242,193,78,0.06) 0%, transparent 70%);
  top: -60px; left: -80px;
}
.pl-glow-2 {
  width: 260px; height: 260px;
  background: radial-gradient(circle, rgba(100,80,220,0.07) 0%, transparent 70%);
  bottom: 20px; right: -40px;
}

/* Комар */
#pl-mosquito {
  position: relative; z-index: 3;
  width: 90px; height: auto;
  animation: pl-fly 2.8s ease-in-out infinite;
  filter: drop-shadow(0 0 16px rgba(242,193,78,0.35));
  margin-bottom: 8px;
}
@keyframes pl-fly {
  0%,100% { transform: translateY(0px) rotate(-4deg); }
  30%     { transform: translateY(-18px) rotate(4deg); }
  60%     { transform: translateY(-8px) rotate(-2deg); }
}
@keyframes pl-fly-away {
  0%   { transform: translateY(0px) rotate(-4deg) scale(1); opacity: 1; }
  100% { transform: translateY(-340px) rotate(-15deg) scale(0.4); opacity: 0; }
}
#pl-mosquito.fly-away {
  animation: pl-fly-away 0.55s ease-in forwards !important;
}

/* Блёстки летающие */
.pl-spark {
  position: absolute; z-index: 2;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #f2c14e;
  animation: pl-spark-float linear infinite;
  opacity: 0;
  box-shadow: 0 0 6px 2px rgba(242,193,78,0.8);
}
@keyframes pl-spark-float {
  0%   { transform: translate(0,0) scale(1);    opacity: 0; }
  15%  { opacity: 1; }
  60%  { opacity: 0.9; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
}

/* Большие редкие блёстки-крестики */
.pl-star {
  position: absolute; z-index: 2;
  color: #f2c14e;
  font-size: 18px;
  animation: pl-star-pulse ease-in-out infinite alternate;
  text-shadow: 0 0 12px rgba(242,193,78,0.9), 0 0 24px rgba(242,193,78,0.4);
  opacity: 0;
}
@keyframes pl-star-pulse {
  0%   { opacity: 0;    transform: scale(0.5) rotate(0deg); }
  30%  { opacity: 0.9;  transform: scale(1.1) rotate(20deg); }
  70%  { opacity: 0.7;  transform: scale(0.9) rotate(-10deg); }
  100% { opacity: 0;    transform: scale(0.6) rotate(30deg); }
}

/* Дрейфующие частицы */
.pl-dust {
  position: absolute; z-index: 2;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: rgba(242,193,78,0.6);
  animation: pl-dust-drift linear infinite;
  opacity: 0;
}
@keyframes pl-dust-drift {
  0%   { transform: translate(0,0);                   opacity: 0; }
  20%  { opacity: 0.7; }
  80%  { opacity: 0.4; }
  100% { transform: translate(var(--dx2), var(--dy2)); opacity: 0; }
}

/* Название */
#pl-title {
  position: relative; z-index: 3;
  font-family: 'Arial Black', 'Impact', sans-serif;
  font-size: 30px; font-weight: 400;
  color: #fff;
  letter-spacing: 3px;
  text-shadow: 0 0 30px rgba(242,193,78,0.4), 0 2px 12px rgba(0,0,0,0.9);
  margin-bottom: 4px;
}
#pl-subtitle {
  position: relative; z-index: 3;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 11px; font-weight: 600;
  color: rgba(242,193,78,0.95);
  text-shadow: 0 0 20px rgba(242,193,78,0.6), 0 0 40px rgba(242,193,78,0.2);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 36px;
}

/* Полоска */
.pl-bar-wrap {
  position: relative; z-index: 3;
  width: 200px; height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px; overflow: hidden;
}
.pl-bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, rgba(242,193,78,0.7), #f2c14e);
  border-radius: 2px;
  transition: width 0.35s ease;
  box-shadow: 0 0 10px rgba(242,193,78,0.5);
}

#pl-text {
  position: relative; z-index: 3;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 11px; font-weight: 400;
  color: rgba(255,255,255,0.28);
  letter-spacing: 2px;
  margin-top: 12px;
  text-transform: uppercase;
}

/* --- главное меню --- */
#menu-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0; }
#menu-screen .game-title { font-size:26px; font-weight:700; color:#fff; margin-bottom:4px; letter-spacing:0.5px; }
#menu-screen .game-sub   { font-size:12px; color:var(--accent); margin-bottom:28px; letter-spacing:2px; text-transform:uppercase; }
.btn-menu { width:200px; padding:12px 0; font-size:15px; font-weight:600; border:none; border-radius:10px; cursor:pointer; margin-bottom:10px; transition:opacity .15s; }
.btn-menu:active { opacity:.75; }
.btn-menu-play    { background:var(--accent); color:#111; }
.btn-menu-ghost   { background:var(--surface-1); color:#fff; border:0.5px solid var(--border); }

/* --- HUD блёстки --- */
#sparkle-hud { position:absolute; top:24px; right:16px; display:flex; align-items:center; gap:4px; pointer-events:none; }
#sparkle-hud .sp-icon { font-size:14px; }
#sparkle-hud .sp-val  { font-size:13px; font-weight:600; color:var(--accent); text-shadow:0 1px 4px rgba(0,0,0,.6); }

/* --- экран лидерборда --- */
.lb-wrap { width: 100%; padding: 0 22px; }
.lb-title { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 16px; text-align: center; }
.lb-list { width: 100%; max-height: 320px; overflow-y: auto; }
.lb-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; margin-bottom: 4px; background: var(--surface-0); }
.lb-row.me { background: rgba(242,193,78,0.16); border: 0.5px solid rgba(242,193,78,0.5); }
.lb-rank { width: 26px; font-size: 14px; font-weight: 700; color: var(--accent); text-align: center; flex-shrink: 0; }
.lb-name { flex: 1; font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lb-score { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.85); }
.lb-empty { font-size: 13px; color: rgba(255,255,255,0.5); text-align: center; padding: 24px 0; }
</style>
</head>

<script>
/* ============================================================
   TELEGRAM WEBAPP SDK  (аналог js/telegram.js)
   ============================================================ */
const TG = (function () {
  const tg = window.Telegram && window.Telegram.WebApp;
  let user = null;
  if (tg) {
    try { tg.ready(); tg.expand(); } catch (e) {}
    user = (tg.initDataUnsafe && tg.initDataUnsafe.user) || null;
  }
  // стабильный id игрока: из Telegram, иначе локальный гость
  let userId, username;
  if (user) {
    userId   = 'tg_' + user.id;
    username = user.username
             || [user.first_name, user.last_name].filter(Boolean).join(' ')
             || 'Игрок';
  } else {
    userId = safeGet('vj_guest_id');
    if (!userId) { userId = 'guest_' + Math.random().toString(36).slice(2, 9); safeSet('vj_guest_id', userId); }
    username = safeGet('vj_guest_name') || 'Игрок';
  }
  return { available: !!tg, raw: tg, userId, username, theme: tg ? tg.colorScheme : 'dark' };
})();

/* безопасное локальное хранилище (не падает в песочнице/в Telegram) */
function safeGet(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }
function safeSet(k,v){ try { localStorage.setItem(k,v); } catch(e){} }

/* ============================================================
   FIREBASE FIRESTORE — ЛИДЕРБОРД  (аналог firebase.js + js/leaderboard.js)
   Вставь сюда конфиг своего проекта. Пока ключи-заглушки —
   игра работает на ЛОКАЛЬНОМ лидерборде (тот же экран, без облака).
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey:            "PASTE_API_KEY",
  authDomain:        "PASTE.firebaseapp.com",
  projectId:         "PASTE_PROJECT_ID",
  storageBucket:     "PASTE.appspot.com",
  messagingSenderId: "PASTE_SENDER_ID",
  appId:             "PASTE_APP_ID"
};

const Leaderboard = {
  ready: false, fb: null,

  async init() {
    if (!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.startsWith('PASTE')) {
      console.info('[Leaderboard] Firebase не настроен — работает локальный лидерборд.');
      return;
    }
    try {
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
      const fs = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const app = initializeApp(FIREBASE_CONFIG);
      this.fb = { db: fs.getFirestore(app), fs };
      this.ready = true;
    } catch (e) {
      console.warn('[Leaderboard] Firebase недоступен, локальный фолбэк:', e);
    }
  },

  // пишем только если новый счёт выше предыдущего
  async submit(userId, username, score) {
    if (!score || score <= 0) return;
    if (this.ready) {
      try {
        const { doc, getDoc, setDoc, serverTimestamp } = this.fb.fs;
        const ref  = doc(this.fb.db, 'scores', userId);
        const snap = await getDoc(ref);
        const prev = snap.exists() ? (snap.data().score || 0) : 0;
        if (score > prev) {
          await setDoc(ref, { userId, username, score, timestamp: serverTimestamp() });
        }
        return;
      } catch (e) { console.warn('[Leaderboard] submit error, локальный фолбэк:', e); }
    }
    // локальный фолбэк
    const list = this._local();
    const cur  = list.find(r => r.userId === userId);
    if (cur) { if (score > cur.score) { cur.score = score; cur.username = username; } }
    else list.push({ userId, username, score });
    this._saveLocal(list);
  },

  // топ-10 для экрана лидерборда
  async top(n = 10) {
    if (this.ready) {
      try {
        const { collection, query, orderBy, limit, getDocs } = this.fb.fs;
        const q = query(collection(this.fb.db, 'scores'), orderBy('score', 'desc'), limit(n));
        const out = [];
        (await getDocs(q)).forEach(d => out.push(d.data()));
        return out;
      } catch (e) { console.warn('[Leaderboard] top error, локальный фолбэк:', e); }
    }
    return this._local().sort((a, b) => b.score - a.score).slice(0, n);
  },

  _local()       { try { return JSON.parse(safeGet('vj_leaderboard') || '[]'); } catch(e){ return []; } },
  _saveLocal(l)  { safeSet('vj_leaderboard', JSON.stringify(l)); }
};

function removeWhiteBackground(img) {
  const cvs = document.createElement('canvas');
  const c = cvs.getContext('2d');
  cvs.width = img.naturalWidth || img.width;
  cvs.height = img.naturalHeight || img.height;
  c.drawImage(img, 0, 0);
  const frame = c.getImageData(0, 0, cvs.width, cvs.height);
  const px = frame.data;
  for (let i = 0; i < px.length; i += 4) {
    const r = px[i], g = px[i + 1], b = px[i + 2];
    const nearWhite = r > 240 && g > 240 && b > 240;
    if (nearWhite) px[i + 3] = 0;
  }
  c.putImageData(frame, 0, 0);
  return cvs;
}

function removeDarkBackground(img) {
  const cvs = document.createElement('canvas');
  const c = cvs.getContext('2d');
  cvs.width = img.naturalWidth || img.width;
  cvs.height = img.naturalHeight || img.height;
  c.drawImage(img, 0, 0);
  const frame = c.getImageData(0, 0, cvs.width, cvs.height);
  const px = frame.data;
  for (let i = 0; i < px.length; i += 4) {
    const r = px[i], g = px[i + 1], b = px[i + 2];
    const luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
    if (luma < 40) px[i + 3] = 0;
  }
  c.putImageData(frame, 0, 0);
  return cvs;
}

function removeLightBackground(img) {
  const cvs = document.createElement('canvas');
  const c = cvs.getContext('2d');
  cvs.width = img.naturalWidth || img.width;
  cvs.height = img.naturalHeight || img.height;
  c.drawImage(img, 0, 0);
  const frame = c.getImageData(0, 0, cvs.width, cvs.height);
  const px = frame.data;
  for (let i = 0; i < px.length; i += 4) {
    const r = px[i], g = px[i + 1], b = px[i + 2];
    if (r > 215 && g > 215 && b > 215) px[i + 3] = 0;
  }
  c.putImageData(frame, 0, 0);
  return cvs;
}

let sparkles = 0, totalSparkles = 0; // за сессию / накопленные
let gems = []; // объекты блёсток на экране
let camY = 0, keys = { left: false, right: false };
let plr, plats, particles, lastTime, accum;
let shieldActive = false, jetTimer = 0, shieldTimer = 0;
let renderNow = 0;
let springPoseTimer = 0;
let shieldCooldown = 0; // защита от немедленного срабатывания

function rnd(a, b) { return a + Math.random() * (b - a); }

// lastPlatType — тип последней сгенерированной платформы (глобальный)
let lastPlatType = 'normal';

function pickType(sc) {
  // Если предыдущая была шип или break — следующая ВСЕГДА безопасная
  if (lastPlatType === 'spike' || lastPlatType === 'break') return Math.random() > 0.5 ? 'normal' : 'moving';
  const r = Math.random();
  if (sc < 200)  return 'normal';
  if (sc < 500)  return r > 0.72 ? 'moving' : r > 0.54 ? 'break' : 'normal';
  if (sc < 900)  return r > 0.62 ? 'moving' : r > 0.42 ? 'break' : 'normal';
  if (sc < 1500) return r > 0.60 ? 'moving' : r > 0.40 ? 'break' : r > 0.20 ? 'spike' : 'normal';
  return r > 0.56 ? 'moving' : r > 0.36 ? 'break' : r > 0.16 ? 'spike' : 'normal';
}

function pickBoost(sc) {
  const r = Math.random();
  // sc < 300: только пружины, редко (8%)
  if (sc < 300) return r < 0.08 ? 'spring' : null;
  // sc < 800: пружины чаще, джетпак изредка (12% total: spring 8%, jet 4%)
  if (sc < 800) {
    if (r < 0.08) return 'spring';
    if (r < 0.12) return 'jetpack';
    return null;
  }
  // sc >= 800: все три, но редко (15% total: spring 8%, jet 4%, shield 3%)
  if (r < 0.08) return 'spring';
  if (r < 0.12) return 'jetpack';
  if (r < 0.15) return 'shield';
  return null;
}

function makePlatform(y) {
  const type = pickType(score);
  lastPlatType = type; // запоминаем для следующей платформы

  // Ширина платформы уменьшается с ростом счёта
  const pwMax = Math.max(45, 80 - Math.floor(score / 300));
  const pwMin = Math.max(35, 55 - Math.floor(score / 400));
  const pw = rnd(pwMin, pwMax);

  const boost = (type === 'spike' || type === 'break') ? null : pickBoost(score);
  const x = rnd(4, W - pw - 4); // X полностью случайный

  return {
    x, y, w: pw, h: PLAT_H,
    type, vx: type === 'moving' ? (Math.random() > .5 ? 1.8 : -1.8) : 0,
    broken: false, boost, breakHits: 0
  };
}

function initGame() {
  camY = 0; score = 0; particles = []; accum = 0; gems = []; sparkles = 0;
  shieldActive = false; jetTimer = 0; shieldTimer = 0; shieldCooldown = 0; springPoseTimer = 0;
  shieldIcon.style.display = 'none';
  jetIcon.style.display    = 'none';
  document.getElementById('sparkle-hud').style.display = 'flex';
  document.getElementById('sparkleLabel').textContent = totalSparkles;
  plr = { x: W/2 - PLR_W/2, y: H - 140, vx: 0, vy: 0, w: PLR_W, h: PLR_H, dir: 1, frame: 0, frameT: 0 };
  plats = [{ x: W/2 - 40, y: H - 90, w: 80, h: PLAT_H, type: 'normal', vx: 0, broken: false, boost: null }];
  for (let i = 1; i < PLAT_COUNT; i++) {
    const topY = plats[plats.length - 1].y;
    plats.push(makePlatform(topY - rnd(55, 75), plats[plats.length-1].x, plats[plats.length-1].w));
  }
}

function addParticles(x, y, color, n = 7) {
  for (let i = 0; i < n; i++)
    particles.push({ x, y, vx: rnd(-3.5, 3.5), vy: rnd(-5, -1), life: 1, color });
}

function fixedUpdate() {
  if (springPoseTimer > 0) {
    springPoseTimer--;
    plr.frame = 1;
    plr.frameT = 0;
  } else {
    plr.frameT++;
    if (plr.frameT > 7) { plr.frame ^= 1; plr.frameT = 0; }
  }
  if (shieldCooldown > 0) shieldCooldown--;
  if (shieldActive && shieldTimer > 0) {
    shieldTimer--;
    if (shieldTimer === 0) {
      shieldActive = false;
      shieldIcon.style.display = 'none';
    }
  }

  if (jetTimer > 0) {
    jetTimer--;
    plr.vy = Math.min(plr.vy, JET_VY);
    if (jetTimer === 0) jetIcon.style.display = 'none';
  } else {
    plr.vy += GRAVITY;
    plr.vy  = Math.min(plr.vy, 22);
  }

  if (keys.left)       { plr.vx = -MOVE_SPD; plr.dir = -1; }
  else if (keys.right) { plr.vx =  MOVE_SPD; plr.dir =  1; }
  else                 { plr.vx *= FRICTION; }

  const nextX = plr.x + plr.vx;
  const nextY = plr.y + plr.vy;

  if (plr.vy > 0 && jetTimer === 0) {
    for (let p of plats) {
      if (p.broken) continue;

      const overlapX = nextX + PLR_W > p.x + 3 && nextX < p.x + p.w - 3;
      const hitH = PLR_H * 0.85;  // нижний край хитбокса — кончики ног комара
      const wasAbove  = plr.y + hitH <= p.y + 4;
      const willBelow = nextY + hitH >= p.y;

      if (overlapX && wasAbove && willBelow) {
        if (p.type === 'spike') {
          if (shieldActive && shieldCooldown === 0) {
            shieldActive = false;
            shieldTimer  = 0;
            shieldIcon.style.display = 'none';
            addParticles(p.x + p.w/2, p.y, '#f0d060', 10);
            plr.vy = JUMP_VY;
            plr.y  = p.y - Math.round(PLR_H * 0.85);
          } else if (!shieldActive) {
            endGame(); return;
          }
          break;
        }

        if (p.boost === 'spring') {
          plr.vy = SPRING_VY;
          springPoseTimer = 10;
          plr.frame = 1;
          plr.frameT = 0;
          p.boost = null;
          addParticles(p.x + p.w/2, p.y, '#ffe066', 8);
        } else if (p.boost === 'jetpack') {
          jetTimer = JET_DUR;
          plr.vy   = JET_VY;
          p.boost  = null;
          jetIcon.style.display = 'inline';
          addParticles(p.x + p.w/2, p.y, '#ff9944', 8);
        } else if (p.boost === 'shield') {
          shieldActive   = true;
          shieldTimer    = 600; // 10 секунд (60fps)
          shieldCooldown = 30;  // 0.5 сек иммунитета сразу после подбора
          p.boost = null;
          shieldIcon.style.display = 'inline';
          addParticles(p.x + p.w/2, p.y, '#88ccff', 8);
          plr.vy = JUMP_VY; // нормальный прыжок с платформы
          plr.y  = p.y - Math.round(PLR_H * 0.85);
        } else if (p.type === 'break') {
          if (p.breakHits === 0) {
            p.breakHits = 1;
            plr.vy = JUMP_VY;
            plr.y  = p.y - Math.round(PLR_H * 0.85);
            addParticles(p.x + p.w/2, p.y, '#d98b62', 8);
          } else {
            p.broken = true;
            addParticles(p.x + p.w/2, p.y, '#8a5a3b', 12);
          }
        } else {
          plr.vy = JUMP_VY;
          plr.y  = p.y - Math.round(PLR_H * 0.85);
        }
        break;
      }
    }
  }

  plr.x = nextX;
  plr.y = plr.y + plr.vy;
  if (plr.x > W)        plr.x = -PLR_W;
  if (plr.x + PLR_W < 0) plr.x = W;

  const thr = H * 0.42;
  if (plr.y < thr) {
    const shift = thr - plr.y;
    plr.y = thr; camY += shift;
    score = Math.max(score, Math.floor(camY / 10));
    scoreLabel.textContent = score;
    for (let p of plats) p.y += shift;
  }

  plats = plats.filter(p => p.y < H + 20);
  // Количество платформ на экране уменьшается с ростом счёта
  const targetCount = Math.max(6, PLAT_COUNT - Math.floor(score / 400));
  // Вертикальный gap увеличивается с ростом счёта (но не больше макс. прыжка)
  const gapMin = Math.min(75,  55 + Math.floor(score / 200));
  const gapMax = Math.min(165, 80 + Math.floor(score / 150));
  while (plats.length < targetCount) {
    let minY = plats[0].y;
    for (let i = 1; i < plats.length; i++) {
      if (plats[i].y < minY) minY = plats[i].y;
    }
    plats.push(makePlatform(minY - rnd(gapMin, gapMax)));
  }

  for (let p of plats) {
    if (p.type === 'moving' && !p.broken) {
      p.x += p.vx;
      if (p.x <= 0 || p.x + p.w >= W) p.vx *= -1;
    }
  }

  for (let pt of particles) {
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.18; pt.life -= 0.045;
  }
  particles = particles.filter(pt => pt.life > 0);

  // ── БЛЁСТКИ: спавн ──────────────────────────────────────────────────────
  // Спавним новые блёстки выше экрана (шанс ~3% каждый тик, не больше 8 штук)
  if (gems.length < 8 && Math.random() < 0.03) {
    const topY = camY - 40;
    gems.push({ x: rnd(10, W - 10), y: topY - rnd(0, H * 0.6), r: 5, collected: false });
  }

  // Двигаем блёстки вместе с камерой (не двигаются сами по себе)
  // Удаляем ушедшие вниз
  gems = gems.filter(g => !g.collected && g.y - camY < H + 30);

  // Проверяем сбор комаром
  const px = plr.x + PLR_W / 2, py = plr.y + PLR_H / 2;
  for (const g of gems) {
    const gsy = g.y - camY; // экранная Y
    const dx = px - g.x, dy = py - gsy;
    if (Math.sqrt(dx*dx + dy*dy) < PLR_W * 0.7 + g.r) {
      g.collected = true;
      sparkles++;
      totalSparkles++;
      safeSet('vj_sparkles', String(totalSparkles));
      document.getElementById('sparkleLabel').textContent = totalSparkles;
      addParticles(g.x, gsy, '#f2c14e', 5);
    }
  }

  if (plr.y > H + 60) {
    if (shieldActive && shieldCooldown === 0) {
      shieldActive = false;
      shieldTimer  = 0;
      shieldIcon.style.display = 'none';
      plr.y  = H * 0.42;
      plr.vy = JUMP_VY;
      const lowest = plats.reduce((a, b) => a.y > b.y ? a : b);
      plr.x = lowest.x + lowest.w / 2 - PLR_W / 2;
    } else if (!shieldActive) {
      endGame();
    }
  }
}

function drawBg() {
  if (Sprites.bgOK) {
    const imgW = Sprites.bg.width;
    const imgH = Sprites.bg.height;
    const scale = Math.max(W / imgW, H / imgH);
    const srcW = W / scale;
    const srcH = H / scale;
    const maxSrcX = Math.max(0, imgW - srcW);
    const maxSrcY = Math.max(0, imgH - srcH);
    const srcX = maxSrcX * 0.5;
    const srcY = Math.min(maxSrcY, camY * 0.035);

    ctx.drawImage(Sprites.bg, srcX, srcY, srcW, srcH, 0, 0, W, H);
    ctx.fillStyle = 'rgba(16, 20, 12, 0.38)';
    ctx.fillRect(0, 0, W, H);

    const focusGlow = ctx.createRadialGradient(W * 0.5, H * 0.45, W * 0.08, W * 0.5, H * 0.5, W * 0.55);
    focusGlow.addColorStop(0, 'rgba(255, 220, 90, 0.14)');
    focusGlow.addColorStop(0.55, 'rgba(90, 80, 20, 0.08)');
    focusGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = focusGlow;
    ctx.fillRect(0, 0, W, H);

    const vignette = ctx.createLinearGradient(0, 0, 0, H);
    vignette.addColorStop(0, 'rgba(5, 8, 6, 0.18)');
    vignette.addColorStop(0.18, 'rgba(0, 0, 0, 0)');
    vignette.addColorStop(0.82, 'rgba(0, 0, 0, 0)');
    vignette.addColorStop(1, 'rgba(5, 8, 6, 0.24)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, W, H);
    return;
  }
  const t = Math.min(1, score / 2500);
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, `rgb(${Math.round(15+t*20)},${Math.round(5+t*15)},${Math.round(35+t*35)})`);
  g.addColorStop(1, `rgb(${Math.round(50+t*30)},${Math.round(15+t*35)},${Math.round(80+t*50)})`);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  const seed = Math.floor(camY / 300) * 300;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  for (let i = 0; i < 28; i++) {
    ctx.beginPath();
    ctx.arc((seed*137+i*79)%W, (seed*103+i*53)%H, i%4===0?1.5:0.8, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawPlatform(p) {
  if (p.broken) return;
  if (p.type === 'normal' && Sprites.platformNormalOK) {
    const padX = 8;
    const dw = p.w + padX * 2;
    const dh = dw * (Sprites.platformNormal.height / Sprites.platformNormal.width);
    const dx = p.x - padX;
    const dy = p.y - dh * 0.307;
    ctx.drawImage(Sprites.platformNormal, dx, dy, dw, dh);
  } else if (p.type === 'moving' && Sprites.platformMovingOK) {
    const padX = 10;
    const dw = p.w + padX * 2;
    const dh = dw * (Sprites.platformMoving.height / Sprites.platformMoving.width);
    const dx = p.x - padX;
    const dy = p.y - dh * 0.05;
    ctx.drawImage(Sprites.platformMoving, dx, dy, dw, dh);
  } else if (p.type === 'break' && Sprites.platformBreakOK) {
    const padX = 10;
    const sheetW = Sprites.platformBreak.width;
    const sheetH = Sprites.platformBreak.height;
    const frameH = Math.floor(sheetH / 2);
    const sy = p.breakHits > 0 ? frameH : 0;
    const dw = p.w + padX * 2;
    const dh = dw * (frameH / sheetW);
    const dx = p.x - padX;
    const dy = p.y - dh * 0.05;
    ctx.drawImage(Sprites.platformBreak, 0, sy, sheetW, frameH, dx, dy, dw, dh);
  } else if (p.type === 'spike' && Sprites.platformSpikeOK) {
    const padX = 10;
    const dw = p.w + padX * 2;
    const dh = dw * (Sprites.platformSpike.height / Sprites.platformSpike.width);
    const dx = p.x - padX;
    const dy = p.y - dh * 0.05;
    ctx.drawImage(Sprites.platformSpike, dx, dy, dw, dh);
  } else {
  const colors   = { normal:'#3dba7e', moving:'#5588d4', break:'#e07050', spike:'#cc4444' };
  const hilights = { normal:'#65d89f', moving:'#7aaae8', break:'#f09070', spike:'#ee7777' };
  ctx.fillStyle = colors[p.type] || colors.normal;
  ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, p.h, 4); ctx.fill();
  ctx.fillStyle = hilights[p.type] || hilights.normal;
  ctx.fillRect(p.x+5, p.y+2, p.w-10, 2);
  }

  if (p.type === 'spike' && !Sprites.platformSpikeOK) {
    ctx.fillStyle = '#ff6666';
    const n = Math.floor(p.w / 9);
    for (let i = 0; i < n; i++) {
      const sx = p.x + 4 + i * 9;
      ctx.beginPath(); ctx.moveTo(sx, p.y); ctx.lineTo(sx+4, p.y-7); ctx.lineTo(sx+8, p.y); ctx.fill();
    }
  }

  if (p.boost) {
    const bx = p.x + p.w/2, by = p.y - 10;
    if (p.boost === 'spring') {
      const bob = Math.sin(renderNow * 0.008 + p.x * 0.05) * 3;
      if (Sprites.springCompressedOK) {
        const sw = 20;
        const sh = sw * (Sprites.springCompressed.height / Sprites.springCompressed.width);
        ctx.drawImage(Sprites.springCompressed, bx - sw / 2, by - sh + 4 + bob, sw, sh);
      } else {
        ctx.fillStyle = '#ffe066';
        ctx.fillRect(bx-4, by-2 + bob, 8, 10);
        ctx.fillRect(bx-6, by-6 + bob, 12, 5);
      }
    } else if (p.boost === 'jetpack') {
      const bob = Math.sin(renderNow * 0.008 + p.x * 0.05) * 2;
      if (Sprites.jetPickupReady()) {
        const jw = 22;
        const jh = jw * (Sprites.jetPickup.height / Sprites.jetPickup.width);
        ctx.drawImage(Sprites.jetPickup, bx - jw / 2, by - jh + 6 + bob, jw, jh);
      } else {
        ctx.fillStyle = '#ff9944';
        ctx.beginPath(); ctx.roundRect(bx-5, by-10 + bob, 10, 14, 3); ctx.fill();
        ctx.fillStyle = '#ffcc66';
        ctx.beginPath(); ctx.arc(bx, by+6 + bob, 4, 0, Math.PI*2); ctx.fill();
      }
    } else if (p.boost === 'shield') {
      ctx.strokeStyle = '#88ccff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(bx, by-12, 11, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = 'rgba(136,204,255,0.3)';
      ctx.beginPath(); ctx.arc(bx, by-12, 11, 0, Math.PI*2); ctx.fill();
    }
  }
}

function drawPlayer() {
  const { x, y, w, h, dir, frame } = plr;
  ctx.save();
  ctx.translate(x + w/2, y + h/2);

  const hw = w/2, hh = h/2;

  // щит — кольцо (не зависит от поворота)
  if (shieldActive) {
    // моргание в последние 3 сек (180 тиков)
    const shieldBlink = shieldTimer < 180 && Math.floor(renderNow / 150) % 2 === 0;
    if (!shieldBlink) {
      ctx.strokeStyle = `rgba(136,204,255,${0.5 + Math.sin(renderNow*0.01)*0.2})`;
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(0, 0, hw+7, 0, Math.PI*2); ctx.stroke();
    }
    // моргание иконки HUD
    shieldIcon.style.opacity = shieldBlink ? '0' : '1';
  }

  // ДЖЕТПАК: вертикальный спрайт с пламенем, анимация поверх крыльев
  if (jetTimer > 0 && Sprites.jetReady()) {
    const idx = Math.floor(renderNow / 70) % Sprites.jetN;
    const col = idx % Sprites.jetCols;
    const row = Math.floor(idx / Sprites.jetCols);
    const sx = col * Sprites.jetCellW;
    const sy = row * Sprites.jetCellH;
    // JH = высота отрисовки всей ячейки. Комар занимает ~35% высоты ячейки.
    // Целевой размер комара ≈ 60px (чуть крупнее обычного 30px *2).
    // Якорь: усик ряда 0 на 25.7% ячейки, ряда 1 на 9.4%.
    const JH = 170; // масштаб: тело комара ~60px
    const JW = JH * (Sprites.jetCellW / Sprites.jetCellH);
    const antOffset = (row === 0) ? 0.257 : 0.094; // доля от JH до усика
    const antY = -antOffset * JH - 15; // -15 = чуть выше центра игрока (hh≈15)
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(Sprites.jet, sx, sy, Sprites.jetCellW, Sprites.jetCellH,
                  -JW/2, antY, JW, JH);
    ctx.restore();
    return;
  }

  if (dir === -1) ctx.scale(-1, 1);  // зеркалим, когда летит влево (вид сбоку)

  // запасное пламя кодом, если лист джетпака ещё не загрузился
  if (jetTimer > 0) {
    ctx.fillStyle = `rgba(255,${Math.round(100+Math.random()*80)},40,0.7)`;
    ctx.beginPath(); ctx.ellipse(0, hh+6, 5, 8+Math.random()*4, 0, 0, Math.PI*2); ctx.fill();
  }

  if (Sprites.ready()) {
    // --- режим спрайтов: кадр 0 = wing_up, кадр 1 = wing_down ---
    const img = frame === 0 ? Sprites.up : Sprites.down;
    const dh = 50, dw = dh * (img.naturalWidth / img.naturalHeight); // сохраняем пропорции
    ctx.imageSmoothingEnabled = false; // пиксель-арт без размытия
    ctx.drawImage(img, -dw/2, -dh*0.5, dw, dh);
    ctx.restore();
    return;
  }

  // --- фолбэк: Василий кодом (заглушка, пока нет PNG) ---
  const wingOffY = frame === 0 ? -hh*0.7 : -hh*0.15;
  const wingTilt = frame === 0 ? -0.25 : 0.15;
  ctx.fillStyle = 'rgba(190,225,255,0.72)';
  ctx.save(); ctx.rotate(wingTilt);
  ctx.beginPath(); ctx.ellipse(-hw*0.55, wingOffY, hw*0.75, hh*0.3, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.save(); ctx.rotate(-wingTilt);
  ctx.beginPath(); ctx.ellipse(hw*0.55, wingOffY, hw*0.75, hh*0.3, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.fillStyle = '#7aaab8';
  ctx.beginPath(); ctx.ellipse(0, hh*0.1, hw*0.62, hh*0.78, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5a8898';
  ctx.beginPath(); ctx.ellipse(0, hh*0.2, hw*0.62, hh*0.5, 0, Math.PI, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-hw*0.23, -hh*0.15, 5.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( hw*0.23, -hh*0.15, 5.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath(); ctx.arc(-hw*0.21, -hh*0.14, 2.8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( hw*0.21, -hh*0.14, 2.8, 0, Math.PI*2); ctx.fill();

  ctx.strokeStyle = '#4a6a7a'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(hw*0.25, -hh*0.35); ctx.lineTo(hw*1.0, -hh*0.65); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-hw*0.25, -hh*0.35); ctx.lineTo(-hw*0.7, -hh*0.6); ctx.stroke();
  ctx.restore();
}

function drawParticles() {
  for (let pt of particles) {
    ctx.globalAlpha = pt.life; ctx.fillStyle = pt.color;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, 3, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawGems() {
  for (const g of gems) {
    if (g.collected) continue;
    const sy = g.y - camY;
    if (sy < -20 || sy > H + 20) continue;
    // Золотая блёстка — простой кружок со звёздочкой
    ctx.save();
    ctx.globalAlpha = 0.92;
    ctx.fillStyle = '#f2c14e';
    ctx.beginPath(); ctx.arc(g.x, sy, g.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `${g.r * 2}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('✦', g.x, sy);
    ctx.restore();
  }
}

function draw() {
  renderNow = performance.now();
  ctx.clearRect(0, 0, W, H);
  drawBg(); for (let p of plats) drawPlatform(p);
  drawGems(); drawPlayer(); drawParticles();
}

function gameLoop(ts) {
  if (state !== 'playing') return;
  if (!lastTime) lastTime = ts;
  const dt = Math.min(ts - lastTime, MAX_FRAME_DT);
  accum += dt; lastTime = ts;
  let steps = 0;
  while (accum >= STEP && steps < 4) { fixedUpdate(); accum -= STEP; steps++; }
  draw();
  requestAnimationFrame(gameLoop);
}

function resetFrameClock() {
  lastTime = null;
  accum = 0;
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) resetFrameClock();
});

window.addEventListener('blur', resetFrameClock);
window.addEventListener('focus', resetFrameClock);

/* ============================================================
   ЭКРАНЫ: главное меню / старт / game over / лидерборд
   ============================================================ */
const overlay = document.getElementById('overlay');

// ── Главное меню ──────────────────────────────────────────────────────────
function showMainMenu() {
  document.getElementById('sparkle-hud').style.display = 'none';
  overlay.innerHTML =
    `<div id="menu-screen">
       <div class="game-title">Василий-прыгун</div>
       <div class="game-sub">SBLESKOM</div>
       <button class="btn-menu btn-menu-play"  id="menuPlayBtn">▶ Играть</button>
       <button class="btn-menu btn-menu-ghost" id="menuLbBtn">🏆 Лидерборд</button>
       <button class="btn-menu btn-menu-ghost" id="menuSettBtn">⚙ Настройки</button>
     </div>`;
  overlay.style.display = 'flex';
  document.getElementById('menuPlayBtn').addEventListener('click', startGame);
  document.getElementById('menuLbBtn').addEventListener('click', () => showLeaderboard('menu'));
  document.getElementById('menuSettBtn').addEventListener('click', showSettings);
}

// ── Настройки (заглушка) ──────────────────────────────────────────────────
function showSettings() {
  overlay.innerHTML =
    `<div style="text-align:center;padding:0 24px">
       <div style="font-size:20px;font-weight:600;color:#fff;margin-bottom:12px">⚙ Настройки</div>
       <div style="font-size:13px;color:rgba(255,255,255,.5);margin-bottom:28px">Скоро здесь появятся настройки!</div>
       <button class="btn-menu btn-menu-ghost" id="settBackBtn">← Назад</button>
     </div>`;
  document.getElementById('settBackBtn').addEventListener('click', showMainMenu);
}

// ── Запуск игры ───────────────────────────────────────────────────────────
function startGame() {
  overlay.style.display = 'none';
  initGame(); state = 'playing'; lastTime = null;
  requestAnimationFrame(gameLoop);
}

// ── Конец игры ────────────────────────────────────────────────────────────
function endGame() {
  state = 'over';
  if (score > best) { best = score; safeSet('vj_best', String(best)); }
  document.getElementById('bestLabel').textContent = 'Рекорд: ' + best;
  document.getElementById('sparkle-hud').style.display = 'none';
  Leaderboard.submit(TG.userId, TG.username, score);
  renderGameOver();
}

function renderGameOver() {
  overlay.innerHTML =
    `<div style="text-align:center">
       <div style="font-size:14px;color:rgba(255,255,255,.5);margin-bottom:4px">Игра окончена</div>
       <div class="sd">${score}</div>
       <div class="sl">очков · ✨ ${sparkles} блёсток</div>
       <button class="btn-menu btn-menu-play"  id="againBtn">▶ Играть снова</button>
       <button class="btn-menu btn-menu-ghost" id="lbBtn">🏆 Лидерборд</button>
       <button class="btn-menu btn-menu-ghost" id="menuBtn">← Меню</button>
     </div>`;
  overlay.style.display = 'flex';
  document.getElementById('againBtn').addEventListener('click', startGame);
  document.getElementById('lbBtn').addEventListener('click', () => showLeaderboard('over'));
  document.getElementById('menuBtn').addEventListener('click', showMainMenu);
}

// ── Лидерборд ─────────────────────────────────────────────────────────────
async function showLeaderboard(from) {
  const backFn = from === 'menu' ? showMainMenu : renderGameOver;
  overlay.innerHTML =
    `<div class="lb-wrap">
       <div class="lb-title">🏆 Топ игроков</div>
       <div class="lb-list" id="lbList"><div class="lb-empty">Загрузка…</div></div>
       <div style="text-align:center"><button class="btn-menu btn-menu-ghost" id="backBtn" style="margin-top:12px">← Назад</button></div>
     </div>`;
  document.getElementById('backBtn').addEventListener('click', backFn);

  const rows = await Leaderboard.top(10);
  const list = document.getElementById('lbList');
  if (!list) return;
  if (!rows.length) { list.innerHTML = `<div class="lb-empty">Пока никто не играл.<br>Будь первым!</div>`; return; }
  const medal = i => (i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1));
  list.innerHTML = rows.map((r, i) => {
    const me = r.userId === TG.userId ? ' me' : '';
    const name = String(r.username || 'Игрок').replace(/</g, '&lt;');
    return `<div class="lb-row${me}">
              <span class="lb-rank">${medal(i)}</span>
              <span class="lb-name">${name}</span>
              <span class="lb-score">${r.score}</span>
            </div>`;
  }).join('');
}

/* ============================================================
   ВВОД  (клавиатура + мобильные кнопки)
   ============================================================ */

document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft' ||e.key==='a') { keys.left =true; e.preventDefault(); }
  if (e.key==='ArrowRight'||e.key==='d') { keys.right=true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  if (e.key==='ArrowLeft' ||e.key==='a') keys.left =false;
  if (e.key==='ArrowRight'||e.key==='d') keys.right=false;
});
const bL = document.getElementById('btnLeft'), bR = document.getElementById('btnRight');
['mousedown','touchstart'].forEach(ev => {
  bL.addEventListener(ev, e => { e.preventDefault(); keys.left =true; });
  bR.addEventListener(ev, e => { e.preventDefault(); keys.right=true; });
});
['mouseup','touchend','mouseleave','touchcancel'].forEach(ev => {
  bL.addEventListener(ev, e => { e.preventDefault(); keys.left =false; });
  bR.addEventListener(ev, e => { e.preventDefault(); keys.right=false; });
});

/* ============================================================
   СТАРТ
   ============================================================ */
best          = parseInt(safeGet('vj_best')     || '0', 10) || 0;
totalSparkles = parseInt(safeGet('vj_sparkles') || '0', 10) || 0;
document.getElementById('bestLabel').textContent = 'Рекорд: ' + best;
Leaderboard.init();

// Скрываем overlay (меню) пока не загрузились спрайты
document.getElementById('overlay').style.display = 'none';

(function waitForSprites() {
  const checks = [
    () => Sprites.bgOK,
    () => Sprites.platformNormalOK,
    () => Sprites.platformMovingOK,
    () => Sprites.platformSpikeOK,
    () => Sprites.platformBreakOK,
    () => Sprites.jetOK,
    () => Sprites.jetPickupOK,
    () => Sprites.springOpenOK,
    () => Sprites.springCompressedOK,
  ];
  const bar  = document.getElementById('pl-bar');
  const text = document.getElementById('pl-text');
  const pl   = document.getElementById('preloader');

  const startTime = Date.now();
  const MIN_SHOW  = 2200; // минимум 2.2 сек показываем прелоадер

  function tick() {
    const loaded = checks.filter(fn => fn()).length;
    const pct    = Math.round(loaded / checks.length * 100);
    bar.style.width = pct + '%';
    text.textContent = pct < 100 ? 'Загрузка… ' + pct + '%' : 'Готово!';

    if (loaded < checks.length) {
      requestAnimationFrame(tick);
    } else {
      // Ждём минимум MIN_SHOW мс с момента старта
      const elapsed = Date.now() - startTime;
      const wait    = Math.max(0, MIN_SHOW - elapsed);
      setTimeout(() => {
        const mosq = document.getElementById('pl-mosquito');
        if (mosq) mosq.classList.add('fly-away');
        setTimeout(() => {
          pl.classList.add('fade-out');
          setTimeout(() => {
            pl.style.display = 'none';
            showMainMenu();
          }, 600);
        }, 480);
      }, wait);
    }
  }
  tick();
})();
</script>
